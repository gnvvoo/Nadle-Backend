spring:
  datasource:
    url: jdbc:h2:mem:nadledb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  profiles:
    include: secret

server:
  port: 8080

bike-api:
  service-key: ${BIKE_API_KEY:}
  endpoint: https://apis.data.go.kr/B551982/pbdo_v2

tour-api:
  service-key: ${TOUR_API_KEY:}
  endpoint: https://apis.data.go.kr/B551011/KorService2

groq-api:
  api-key: ${GROQ_API_KEY:}
  endpoint: https://api.groq.com/openai/v1/chat/completions
  model: gemma2-9b-it
  mock: false

store-api:
  service-key: ${STORE_API_KEY:}
  endpoint: https://apis.data.go.kr/B553077/api/open/sdsc2
